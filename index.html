<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💕</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="mainContent">
            <h1>💝 Hi Babyy! 💝</h1>
            <p class="question">Will you be my Valentine? 🥺</p>
            
            <div class="button-container">
                <button class="btn btn-yes" id="yesBtn">Yes! 💕</button>
                <button class="btn btn-no" id="noBtn">No</button>
            </div>

            <div class="guilt-message" id="guiltMessage"></div>
            <div class="guilt-images" id="guiltImages"></div>
        </div>

        <div class="success-message" id="successMessage">
            <h2>🎉 Yay! You said YES! 🎉</h2>
            <p>I'm so happy! You've made my day! 💖✨</p>
            <p class="success-subtext">Get ready for the best Valentine's Day ever! 🥰</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
